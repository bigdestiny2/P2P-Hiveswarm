<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Catalog — HiveRelay</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2358a6ff'/%3E%3Cstop offset='100%25' stop-color='%233fb950'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='50,8 72,20.5 72,45.5 50,58 28,45.5 28,20.5' fill='url(%23g)' opacity='.9'/%3E%3Cpolygon points='27,52 49,64.5 49,89.5 27,102 5,89.5 5,64.5' fill='url(%23g)' opacity='.7'/%3E%3Cpolygon points='73,52 95,64.5 95,89.5 73,102 51,89.5 51,64.5' fill='url(%23g)' opacity='.7'/%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--card:#16213e;--card-border:#1e2d50;
  --green:#0f0;--orange:#f90;--cyan:#0af;--red:#f44;--purple:#b266ff;--pink:#ff6699;
  --text:#e0e0e0;--text-dim:#7a8ba0;--text-bright:#fff;
  --mono:'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:1rem}

.topbar{
  background:var(--card);border-bottom:1px solid var(--card-border);
  padding:1rem 2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
  position:sticky;top:0;z-index:100;margin:-1rem -1rem 1.5rem -1rem;
}
.topbar-logo{display:flex;align-items:center;gap:.75rem;text-decoration:none}
.hive-logo{width:32px;height:32px;flex-shrink:0}
.topbar h1{font-size:1.2rem;color:var(--text-bright);font-weight:600}
.topbar-nav{display:flex;gap:.25rem;margin-left:1.5rem;flex-wrap:wrap}
.topbar-nav a{
  color:var(--text);text-decoration:none;padding:.4rem .85rem;border-radius:4px;
  font-size:.9rem;transition:all .15s;
}
.topbar-nav a:hover{background:rgba(255,255,255,.08);color:var(--text-bright)}
.topbar-nav a.active{background:rgba(88,166,255,.15);color:var(--cyan)}

.container{max-width:1400px;margin:0 auto}
.page-title{color:var(--text-bright);font-size:1.6rem;margin-bottom:.25rem}
.page-subtitle{color:var(--text-dim);margin-bottom:1.5rem}

.toolbar{
  background:var(--card);border:1px solid var(--card-border);border-radius:8px;
  padding:1rem;margin-bottom:1rem;display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;
}
.search-input{
  flex:1;min-width:200px;background:#0d1526;color:var(--text);
  border:1px solid var(--card-border);border-radius:4px;padding:.55rem .8rem;
  font-family:var(--mono);font-size:.9rem;
}
.search-input:focus{outline:none;border-color:var(--cyan)}
.filter-chip{
  background:#0d1526;border:1px solid var(--card-border);color:var(--text);
  padding:.4rem .85rem;border-radius:20px;cursor:pointer;font-size:.85rem;
  transition:all .15s;
}
.filter-chip:hover{border-color:var(--cyan)}
.filter-chip.active{background:var(--cyan);color:#000;border-color:var(--cyan);font-weight:600}

.stats-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.75rem;
  margin-bottom:1.5rem;
}
.stat-card{
  background:var(--card);border:1px solid var(--card-border);border-radius:6px;
  padding:.9rem 1.1rem;
}
.stat-label{color:var(--text-dim);font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
.stat-value{color:var(--text-bright);font-size:1.6rem;font-weight:600;margin-top:.25rem;font-family:var(--mono)}

.catalog-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem;
}
.catalog-card{
  background:var(--card);border:1px solid var(--card-border);border-radius:8px;
  padding:1.1rem;transition:all .15s;display:flex;flex-direction:column;gap:.5rem;
}
.catalog-card:hover{border-color:var(--cyan);transform:translateY(-2px)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
.card-title{color:var(--text-bright);font-weight:600;font-size:1rem;line-height:1.3;flex:1;word-break:break-word}
.card-type-badge{
  padding:.15rem .55rem;border-radius:10px;font-size:.7rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;
}
.type-app{background:rgba(88,166,255,.2);color:var(--cyan)}
.type-drive{background:rgba(63,185,80,.2);color:var(--green)}
.type-dataset{background:rgba(178,102,255,.2);color:var(--purple)}
.type-media{background:rgba(255,102,153,.2);color:var(--pink)}
.type-resource{background:rgba(255,153,0,.2);color:var(--orange)}

.card-description{color:var(--text-dim);font-size:.85rem;line-height:1.5;min-height:2.5rem}
.card-meta{display:flex;flex-wrap:wrap;gap:.5rem;font-size:.75rem;color:var(--text-dim)}
.card-meta span{background:rgba(255,255,255,.05);padding:.15rem .5rem;border-radius:3px}
.card-key{
  font-family:var(--mono);font-size:.7rem;color:var(--text-dim);
  background:#0d1526;padding:.4rem .55rem;border-radius:4px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;
}
.card-key:hover{color:var(--cyan)}
.card-actions{display:flex;gap:.5rem;margin-top:.5rem}
.btn{
  flex:1;background:rgba(88,166,255,.12);color:var(--cyan);border:1px solid rgba(88,166,255,.3);
  padding:.45rem .75rem;border-radius:4px;cursor:pointer;font-size:.8rem;
  text-align:center;text-decoration:none;transition:all .15s;
}
.btn:hover{background:var(--cyan);color:#000}
.btn-secondary{background:rgba(255,255,255,.05);color:var(--text);border-color:var(--card-border)}
.btn-secondary:hover{background:rgba(255,255,255,.1);color:var(--text-bright)}

.empty-state{
  background:var(--card);border:1px dashed var(--card-border);border-radius:8px;
  padding:3rem;text-align:center;color:var(--text-dim);
}
.empty-state h3{color:var(--text);margin-bottom:.5rem}

.pagination{
  display:flex;justify-content:center;gap:.5rem;margin-top:1.5rem;align-items:center;
}
.page-info{color:var(--text-dim);font-size:.85rem;padding:0 1rem}

.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;background:var(--card);
  border:1px solid var(--green);color:var(--green);padding:.75rem 1.25rem;
  border-radius:4px;font-size:.9rem;opacity:0;transition:opacity .2s;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <a href="/dashboard" class="topbar-logo">
    <svg class="hive-logo" viewBox="0 0 100 100">
      <defs><linearGradient id="gl" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#58a6ff"/><stop offset="100%" stop-color="#3fb950"/></linearGradient></defs>
      <polygon points="50,8 72,20.5 72,45.5 50,58 28,45.5 28,20.5" fill="url(#gl)" opacity=".9"/>
      <polygon points="27,52 49,64.5 49,89.5 27,102 5,89.5 5,64.5" fill="url(#gl)" opacity=".7"/>
      <polygon points="73,52 95,64.5 95,89.5 73,102 51,89.5 51,64.5" fill="url(#gl)" opacity=".7"/>
    </svg>
    <h1>HiveRelay</h1>
  </a>
  <nav class="topbar-nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/catalog" class="active">Catalog</a>
    <a href="/network">Network</a>
    <a href="/leaderboard">Leaderboard</a>
    <a href="/payments">Payments</a>
    <a href="/calculator">Calculator</a>
    <a href="/docs">Docs</a>
  </nav>
</div>

<div class="container">
  <h2 class="page-title">Content Catalog</h2>
  <p class="page-subtitle">Browse apps, drives, datasets, and media seeded across the HiveRelay network.</p>

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Apps</div><div class="stat-value" id="stat-apps">—</div></div>
    <div class="stat-card"><div class="stat-label">Drives</div><div class="stat-value" id="stat-drives">—</div></div>
    <div class="stat-card"><div class="stat-label">Datasets</div><div class="stat-value" id="stat-datasets">—</div></div>
    <div class="stat-card"><div class="stat-label">Media</div><div class="stat-value" id="stat-media">—</div></div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="search" placeholder="Search by name, description, key, or category...">
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip" data-filter="app">Apps</button>
    <button class="filter-chip" data-filter="drive">Drives</button>
    <button class="filter-chip" data-filter="dataset">Datasets</button>
    <button class="filter-chip" data-filter="media">Media</button>
    <button class="filter-chip" data-filter="resource">Resources</button>
  </div>

  <div class="catalog-grid" id="catalog-grid"></div>

  <div class="pagination" id="pagination" style="display:none">
    <button class="btn btn-secondary" id="prev-page">← Previous</button>
    <span class="page-info" id="page-info">Page 1</span>
    <button class="btn btn-secondary" id="next-page">Next →</button>
  </div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
const state = {
  items: [],
  filtered: [],
  filter: 'all',
  search: '',
  page: 1,
  pageSize: 24,
  stats: { app: 0, drive: 0, dataset: 0, media: 0, resource: 0, total: 0 }
}

async function loadCatalog () {
  try {
    const res = await fetch('/catalog.json?pageSize=200', { cache: 'no-store' })
    const data = await res.json()
    // Support both v2 ({apps:[],drives:[]...}) and paginated ({items:[]}) shapes
    let items = []
    if (Array.isArray(data.items)) {
      items = data.items
    } else {
      items = [
        ...(data.apps || []),
        ...(data.drives || []),
        ...(data.datasets || []),
        ...(data.media || []),
        ...(data.resources || [])
      ]
    }
    state.items = items
    countStats()
    applyFilter()
  } catch (err) {
    document.getElementById('catalog-grid').innerHTML =
      `<div class="empty-state"><h3>Could not load catalog</h3><p>${err.message}</p></div>`
  }
}

function countStats () {
  const s = { app: 0, drive: 0, dataset: 0, media: 0, resource: 0, total: state.items.length }
  for (const item of state.items) {
    const t = item.type || 'app'
    if (s[t] !== undefined) s[t]++
  }
  state.stats = s
  document.getElementById('stat-total').textContent = s.total
  document.getElementById('stat-apps').textContent = s.app
  document.getElementById('stat-drives').textContent = s.drive
  document.getElementById('stat-datasets').textContent = s.dataset
  document.getElementById('stat-media').textContent = s.media
}

function applyFilter () {
  const search = state.search.toLowerCase().trim()
  state.filtered = state.items.filter(item => {
    const type = item.type || 'app'
    if (state.filter !== 'all' && type !== state.filter) return false
    if (!search) return true
    const haystack = [
      item.name, item.description, item.appKey, item.key,
      ...(item.categories || []), item.author
    ].filter(Boolean).join(' ').toLowerCase()
    return haystack.includes(search)
  })
  state.page = 1
  renderGrid()
}

function renderGrid () {
  const grid = document.getElementById('catalog-grid')
  if (state.filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h3>No items found</h3><p>Try a different filter or search.</p></div>'
    document.getElementById('pagination').style.display = 'none'
    return
  }

  const start = (state.page - 1) * state.pageSize
  const pageItems = state.filtered.slice(start, start + state.pageSize)

  grid.innerHTML = pageItems.map(renderCard).join('')

  // Pagination
  const totalPages = Math.ceil(state.filtered.length / state.pageSize)
  const pag = document.getElementById('pagination')
  if (totalPages > 1) {
    pag.style.display = 'flex'
    document.getElementById('page-info').textContent = `Page ${state.page} / ${totalPages}`
    document.getElementById('prev-page').disabled = state.page <= 1
    document.getElementById('next-page').disabled = state.page >= totalPages
  } else {
    pag.style.display = 'none'
  }

  // Attach key-copy listeners
  grid.querySelectorAll('.card-key').forEach(el => {
    el.addEventListener('click', () => copyToClipboard(el.dataset.key))
  })
}

function renderCard (item) {
  const type = item.type || 'app'
  const key = item.appKey || item.key || ''
  const name = escapeHtml(item.name || 'Unnamed')
  const desc = escapeHtml(item.description || 'No description available.')
  const author = item.author ? escapeHtml(item.author) : ''
  const cats = (item.categories || []).slice(0, 3).map(c =>
    `<span>${escapeHtml(c)}</span>`).join('')
  const version = item.version ? `<span>v${escapeHtml(item.version)}</span>` : ''
  const gatewayUrl = `/v1/hyper/${key}/`

  return `
    <div class="catalog-card">
      <div class="card-header">
        <div class="card-title">${name}</div>
        <span class="card-type-badge type-${type}">${type}</span>
      </div>
      <div class="card-description">${desc}</div>
      ${(version || author || cats) ? `<div class="card-meta">${version}${author ? `<span>by ${author}</span>` : ''}${cats}</div>` : ''}
      <div class="card-key" data-key="${escapeHtml(key)}" title="Click to copy">${key || '(no key)'}</div>
      <div class="card-actions">
        <a href="${gatewayUrl}" target="_blank" class="btn">Browse Files</a>
        <button class="btn btn-secondary" onclick="copyToClipboard('${escapeHtml(key)}')">Copy Key</button>
      </div>
    </div>
  `
}

function escapeHtml (s) {
  if (s === null || s === undefined) return ''
  return String(s).replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]))
}

function copyToClipboard (text) {
  if (!text) return
  navigator.clipboard?.writeText(text).then(() => {
    const toast = document.getElementById('toast')
    toast.classList.add('show')
    setTimeout(() => toast.classList.remove('show'), 1500)
  }).catch(() => {})
}

// Event listeners
document.getElementById('search').addEventListener('input', (e) => {
  state.search = e.target.value
  applyFilter()
})

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'))
    chip.classList.add('active')
    state.filter = chip.dataset.filter
    applyFilter()
  })
})

document.getElementById('prev-page').addEventListener('click', () => {
  if (state.page > 1) { state.page--; renderGrid() }
})
document.getElementById('next-page').addEventListener('click', () => {
  const totalPages = Math.ceil(state.filtered.length / state.pageSize)
  if (state.page < totalPages) { state.page++; renderGrid() }
})

// Auto-refresh every 30s
loadCatalog()
setInterval(loadCatalog, 30_000)
</script>
</body>
</html>
