releaseNotes: >-
  v0.6.0 — first Umbrel App Store release.


  Highlights:
   - One-click install via the Umbrel App Store
   - Auto-detection of LNbits running on the same Umbrel
   - 5-step setup wizard (under 10 minutes from install to earning)
   - Earnings dashboard with daily / weekly / monthly sat counters
   - Default policy: review every incoming seed request before accepting
   - Mid-tier pricing pre-filled (10 sats/GB-month storage, 20 sats/GB
     egress) — adjustable from the dashboard


  This app is the user-facing debut of the project's rebrand from
  HiveRelay to Blindspark. Underlying packages, classes, and the GHCR
  image name remain prefixed `p2p-hiverelay` for v0.6.0; a future
  release (v0.7.0) will complete the rename across the codebase.
